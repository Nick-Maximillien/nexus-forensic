services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    volumes:
      - ./molten-aurora-475715-f3-9c2988f382f9.json:/app/secrets/gcp_sa.json:ro
    environment:
      DATABASE_URL: postgres://postgres:37388710Max!@db:5432/medgate_db
      NODE_SIGNING_URL: http://host.docker.internal:4000/sign-and-send-tx
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gcp_sa.json
      GCP_PROJECT_ID: molten-aurora-475715-f3
      # Force Docling to look at the baked cache, not the internet
      HF_HUB_OFFLINE: 1 
    
    # 1. Run Migrations
    # 2. Start Gunicorn with PRELOAD (Uses the baked models efficiently)
    # 3. Timeout 600s (Safety buffer)
    # 4. Workers 1 (Prevents RAM explosion)
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      gunicorn medgate.wsgi:application --bind 0.0.0.0:8000 --timeout 600 --preload --workers 1
      "

  # (Database section remains unchanged)
  db:
    image: pgvector/pgvector:pg15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 37388710Max!
      POSTGRES_DB: medgate_db

volumes:
  postgres_data: